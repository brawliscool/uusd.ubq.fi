name: Temp Wire CowSwap Fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/cowswap-inventory-max
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Wire review fix module
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/app.ts')
          s = p.read_text()
          line = 'import "./components/simplified-exchange-component.review-fixes.ts";\n'
          anchor = 'import { SimplifiedExchangeComponent } from "./components/simplified-exchange-component.ts";\n'
          if line not in s:
              s = s.replace(anchor, anchor + line)
              p.write_text(s)
          PY
          git config user.name brawliscool
          git config user.email 181055418+brawliscool@users.noreply.github.com
          git add src/app.ts
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "wire simplified exchange review fixes"
            git push origin HEAD:fix/cowswap-inventory-max
          fi
