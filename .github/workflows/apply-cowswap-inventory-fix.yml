name: Apply CowSwap inventory fix

on:
  push:
    branches:
      - fix/cowswap-inventory-max
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    if: ${{ !contains(github.event.head_commit.message, 'fix cowswap inventory review issues') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch files
        run: |
          python <<'PY'
          from pathlib import Path

          constants = Path("src/constants/inventory-constants.ts")
          constants.parent.mkdir(parents=True, exist_ok=True)
          constants.write_text("export const MIN_VISIBLE_TOKEN_USD_VALUE = 1;\n", encoding="utf-8")

          simplified = Path("src/components/simplified-exchange-component.ts")
          text = simplified.read_text(encoding="utf-8")
          text = text.replace(
              'import { getMaxTokenBalance, hasAvailableBalance } from "../utils/balance-utils.ts";\n',
              'import { getMaxTokenBalance, hasAvailableBalance } from "../utils/balance-utils.ts";\nimport { isBalanceZero } from "../utils/token-utils.ts";\n',
          )
          text = text.replace(
              'import tokenList from "../constants/token-list.json" with { type: "json" };\n\nconst MIN_VISIBLE_TOKEN_USD_VALUE = 1;\n',
              'import tokenList from "../constants/token-list.json" with { type: "json" };\nimport { MIN_VISIBLE_TOKEN_USD_VALUE } from "../constants/inventory-constants.ts";\n',
          )
          text = text.replace('option.text = "No tokens above $1";', 'option.text = "No selectable tokens";')
          text = text.replace(
              '''  private _getVisibleTokenBalances(balances: TokenBalance[]): TokenBalance[] {
    return balances.filter((balance) => (balance.usdValue ?? 0) >= MIN_VISIBLE_TOKEN_USD_VALUE);
  }
''',
              '''  private _getVisibleTokenBalances(balances: TokenBalance[]): TokenBalance[] {
    return balances.filter((balance) => {
      if (isBalanceZero(balance.balance, balance.decimals)) {
        return false;
      }

      // Keep real wallet balances selectable when USD pricing is missing or unavailable.
      if (balance.usdValue === undefined || balance.usdValue === null || balance.usdValue === 0) {
        return true;
      }

      return balance.usdValue >= MIN_VISIBLE_TOKEN_USD_VALUE;
    });
  }
''',
          )
          text = text.replace(
              '''  private _getSelectedToken() {
    const selectEl = document.getElementById("tokenSelect") as HTMLSelectElement;
    if (!selectEl) {
      return INVENTORY_TOKENS.LUSD;
    }
    const selectedOption = selectEl.selectedOptions[0];
    if (!selectedOption || !selectedOption.value) {
      return INVENTORY_TOKENS.LUSD;
    }
    const address = selectedOption.value as Address;
    const decimalsAttr = selectedOption.getAttribute("data-decimals");
    const symbolAttr = selectedOption.getAttribute("data-symbol");
    const decimals = decimalsAttr ? parseInt(decimalsAttr, 10) : 18;
    const symbol = symbolAttr || "UNKNOWN";
    return {
      address,
      symbol,
      decimals,
    };
  }
''',
              '''  private _getSelectedToken(): { address: Address; symbol: string; decimals: number } | null {
    const selectEl = document.getElementById("tokenSelect") as HTMLSelectElement | null;
    if (!selectEl) {
      return null;
    }
    const selectedOption = selectEl.selectedOptions[0];
    if (!selectedOption || !selectedOption.value) {
      return null;
    }
    const address = selectedOption.value as Address;
    const decimalsAttr = selectedOption.getAttribute("data-decimals");
    const symbolAttr = selectedOption.getAttribute("data-symbol");
    const decimals = decimalsAttr ? parseInt(decimalsAttr, 10) : 18;
    const symbol = symbolAttr || "UNKNOWN";
    return {
      address,
      symbol,
      decimals,
    };
  }
''',
          )
          text = text.replace(
              '''      const selectedToken = this._getSelectedToken();
      const inputToken = this._state.direction === "deposit" ? selectedToken : INVENTORY_TOKENS.UUSD;
''',
              '''      const selectedToken = this._getSelectedToken();
      if (!selectedToken) {
        this._state.routeResult = null;
        this._renderOutput();
        return;
      }
      const inputToken = this._state.direction === "deposit" ? selectedToken : INVENTORY_TOKENS.UUSD;
''',
          )
          text = text.replace(
              '''        // Only show UBQ option if fractional AND minting is allowed
        const shouldShowUbqOption =
          this._state.protocolSettings.isFractional &&
          !this._state.mintingDisabled &&
          areAddressesEqual(this._getSelectedToken().address, LUSD_COLLATERAL.address);
''',
              '''        // Only show UBQ option if fractional AND minting is allowed
        const selectedToken = this._getSelectedToken();
        const isLusdSelected = selectedToken ? areAddressesEqual(selectedToken.address, LUSD_COLLATERAL.address) : false;
        const shouldShowUbqOption = this._state.protocolSettings.isFractional && !this._state.mintingDisabled && isLusdSelected;
''',
          )
          text = text.replace(
              '''        const fromToken = this._state.direction === "deposit" ? this._getSelectedToken().address : INVENTORY_TOKENS.UUSD.address;
        const allowance = await this._services.cowSwapService.getCowSwapSdk().getCowProtocolAllowance({
''',
              '''        const selectedToken = this._state.direction === "deposit" ? this._getSelectedToken() : null;
        if (this._state.direction === "deposit" && !selectedToken) {
          button.textContent = "Select a token";
          button.disabled = true;
          return;
        }
        const fromToken = this._state.direction === "deposit" ? selectedToken!.address : INVENTORY_TOKENS.UUSD.address;
        const allowance = await this._services.cowSwapService.getCowSwapSdk().getCowProtocolAllowance({
''',
          )
          text = text.replace(
              '''    this._services.notificationManager.showSuccess(
      "exchange",
      `Successfully ${direction.toLowerCase()} ${this._state.amount} ${this._state.direction === "deposit" ? this._getSelectedToken().symbol : INVENTORY_TOKENS.UUSD.symbol}!`
    );
''',
              '''    const selectedToken = this._getSelectedToken();
    const tokenSymbol = this._state.direction === "deposit" ? (selectedToken?.symbol ?? "token") : INVENTORY_TOKENS.UUSD.symbol;
    this._services.notificationManager.showSuccess("exchange", `Successfully ${direction.toLowerCase()} ${this._state.amount} ${tokenSymbol}!`);
''',
          )
          text = text.replace(
              '''    const selectedToken = this._state.direction === "deposit" ? this._getSelectedToken() : INVENTORY_TOKENS.UUSD;
    const tokenSymbol = selectedToken.symbol;
''',
              '''    const selectedToken = this._state.direction === "deposit" ? this._getSelectedToken() : INVENTORY_TOKENS.UUSD;
    if (!selectedToken) {
      return false;
    }
    const tokenSymbol = selectedToken.symbol;
''',
          )
          simplified.write_text(text, encoding="utf-8")

          inventory = Path("src/components/inventory-bar-component.ts")
          text = inventory.read_text(encoding="utf-8")
          text = text.replace(
              'import { batchFetchTokenBalances } from "../utils/batch-request-utils.ts";\n\nimport icons from "./icons.ts";\n\nconst MIN_VISIBLE_TOKEN_USD_VALUE = 1;\n',
              'import { batchFetchTokenBalances } from "../utils/batch-request-utils.ts";\nimport { MIN_VISIBLE_TOKEN_USD_VALUE } from "../constants/inventory-constants.ts";\n\nimport icons from "./icons.ts";\n',
          )
          text = text.replace(
              '''    // Filter out zero balances and low-value dust to keep wallet spam out of the inventory view.
    const visibleBalances = this._state.balances.filter(
      (balance) => !isBalanceZero(balance.balance, balance.decimals) && (balance.usdValue ?? 0) >= MIN_VISIBLE_TOKEN_USD_VALUE
    );
''',
              '''    // Filter out zero balances and known low-value dust while preserving balances without USD pricing.
    const visibleBalances = this._state.balances.filter((balance) => {
      if (isBalanceZero(balance.balance, balance.decimals)) {
        return false;
      }

      if (balance.usdValue === undefined || balance.usdValue === null || balance.usdValue === 0) {
        return true;
      }

      return balance.usdValue >= MIN_VISIBLE_TOKEN_USD_VALUE;
    });
''',
          )
          inventory.write_text(text, encoding="utf-8")

          workflow = Path(".github/workflows/apply-cowswap-inventory-fix.yml")
          if workflow.exists():
            workflow.unlink()
          PY

      - name: Validate patch applied
        run: |
          grep -R "const MIN_VISIBLE_TOKEN_USD_VALUE = 1" -n src/components && exit 1 || true
          grep -R "No tokens above" -n src/components && exit 1 || true
          grep -R "this._getSelectedToken().address" -n src/components/simplified-exchange-component.ts && exit 1 || true
          git diff --check

      - name: Commit fix
        run: |
          git config user.name "brawliscool"
          git config user.email "181055418+brawliscool@users.noreply.github.com"
          git add src/components/simplified-exchange-component.ts src/components/inventory-bar-component.ts src/constants/inventory-constants.ts .github/workflows/apply-cowswap-inventory-fix.yml
          git commit -m "fix cowswap inventory review issues"
          git push origin HEAD:${{ github.ref_name }}
